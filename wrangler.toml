# ============================================================
# Configuración de Cloudflare para P2P Drop Radar
# ------------------------------------------------------------
# Se despliega como Cloudflare Pages: sirve /public (tablero + panel)
# y /functions (API). Las Pages Functions acceden a D1 mediante el
# binding "DB" declarado abajo.
#
# El muestreo periódico (src/worker.js) se conecta como Worker con
# cron en una iteración posterior; su lógica de captura/almacenado se
# comparte con las Functions vía src/snapshot.js. Para el demo en vivo,
# la API auto-siembra la base si está vacía.
#
# NOTA: el nombre lleva el prefijo obligatorio "agc-".
# ============================================================

name = "agc-p2p-drop-radar"
compatibility_date = "2024-09-01"

# Carpeta estática que sirve Cloudflare Pages (tablero + panel).
pages_build_output_dir = "public"

# --- Base de datos D1 (SQLite serverless) para series temporales ---
# Justificación: D1 es SQLite serverless nativo de Cloudflare, ideal para
# series temporales pequeñas/medianas con SQL sencillo, coste cero en reposo
# y baja latencia junto a las Functions. Todo dentro del mismo entorno.
[[d1_databases]]
binding = "DB"
database_name = "agc-p2p-drop-radar-db"
database_id = "8e80cd79-f805-4c4b-a939-09ee77a73ff1"

# Carpeta de migraciones para `wrangler d1 migrations`.
migrations_dir = "migrations"

# --- Variables de entorno NO secretas (valores por defecto) ---
[vars]
DROP_THRESHOLD = "70"        # % a partir del cual se dispara una alerta
INTERVAL_MINUTES = "5"       # frecuencia lógica del muestreo

# --- Secretos (NO se ponen aquí; se cargan con `wrangler pages secret put`) ---
# ADMIN_TOKEN          -> token del panel de administración
# TELEGRAM_BOT_TOKEN   -> token del bot de Telegram para alertas
# TELEGRAM_CHAT_ID     -> chat destino de las alertas
